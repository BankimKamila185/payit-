<div class="phone">
  <div class="bar">
    <button class="back" id="back" style="display:none">‹</button>
    <b id="title">payit</b>
    <span style="margin-left:auto" class="pill grey" id="devPill">device: —</span>
  </div>

</div>

<script>
const API = "http://localhost:8001";
let TOKEN = null, USER = null, LAST = null;
const $ = (id) => document.getElementById(id);

/* ── fingerprint: recomputed EVERY call, never cached. It is a risk SIGNAL that
      the server scores against the baseline stored with your passkey — the
      identity itself comes from the passkey, never from this. ─────────────── */
function fingerprint() {
  let canvas = "";
  try {
    const c = document.createElement("canvas"), x = c.getContext("2d");
    x.textBaseline = "top"; x.font = "14px Arial"; x.fillText("payit-fp", 2, 2);
    const d = c.toDataURL(); let h = 0;
    for (let i = 0; i < d.length; i++) h = (h * 31 + d.charCodeAt(i)) | 0;
    canvas = Math.abs(h).toString(36);
  } catch {}
  return { ua: navigator.userAgent, lang: navigator.language,
           screen: `${screen.width}x${screen.height}`,
           tz: Intl.DateTimeFormat().resolvedOptions().timeZone, canvas };
}

async function api(path, body, auth) {
  const h = { "Content-Type": "application/json" };
  if (auth && TOKEN) h["Authorization"] = `Bearer ${TOKEN}`;
  const r = await fetch(API + path, { method: "POST", headers: h, body: JSON.stringify(body) });
  return { ok: r.ok, status: r.status, data: await r.json().catch(() => ({})) };
}
async function apiGet(path, auth) {
  const h = {};
  if (auth && TOKEN) h["Authorization"] = `Bearer ${TOKEN}`;
  const r = await fetch(API + path, { headers: h });
  return { ok: r.ok, status: r.status, data: await r.json().catch(() => ({})) };
}
const money = (n) => "₹" + Number(n).toLocaleString("en-IN");

/* ───────────────────────────── router ───────────────────────────── */
const stack = [];
const NEW = {};                 // in-progress signup (phone, name, bank, vpa…)

/* ── idempotency: ONE stable key per (payee, amount) attempt, reused across every
      retry of that attempt (double-tap, slow network) so the backend dedupes and
      never debits twice. Cleared once the attempt resolves so a genuine repeat pay
      later gets a fresh key. ─────────────────────────────────────────────────── */
const payKeys = {};
function idemKey(sig) {
  if (!payKeys[sig]) payKeys[sig] = (crypto.randomUUID?.() ?? `k-${Date.now()}-${Math.random().toString(36).slice(2)}`);
  return payKeys[sig];
}
function go(screen, replace) {
  if (replace) stack.pop();
  stack.push(screen);
  render();
}
function back() { stack.pop(); render(); }
$("back").onclick = back;

function render() {
  const s = stack[stack.length - 1] || "login";
  $("back").style.display = stack.length > 1 ? "block" : "none";
  $("title").textContent = { login:"payit", home:"Home", pay:"Send money",
                             result:"Payment", device:"Device security",
                             phone:"Create account", otp:"Verify number",
                             details:"Your account", pins:"Set your PINs",
                             ops:"Fraud Ops Console", payotp:"Verify payment" }[s] || "payit";
  $("devPill").textContent = USER ? "device: bound" : "device: —";
  $("devPill").className = "pill " + (USER ? "green" : "grey");
  ({ login: Login, home: Home, pay: Pay, result: Result, device: Device,
     phone: Phone, otp: Otp, details: Details, pins: Pins, ops: Ops,
     payotp: PayOtp }[s] || Login)();
}

/* ───────────────────────────── 1. LOGIN ───────────────────────────── */
function Login() {
  $("body").innerHTML = `
    <h2>Welcome back</h2>
    <div class="sub">Sign in with your UPI ID and app PIN, or your passkey.</div>
    <label>UPI ID</label><input id="vpa" value="omsawant@okicici" />
    <label>App PIN (4-digit)</label><input id="pin" type="password" value="1234" />
    <button class="primary" id="b1">Login</button>
    <button id="b2">Login with passkey (Touch ID)</button>
    <button class="ghost" id="b3">Bind a passkey to this device (needs your PIN)</button>
    <button class="ghost" id="b4" style="color:#eb3b88">New here? Create an account →</button>
    <div class="err" id="err"></div>`;
  $("b4").onclick = () => go("phone");

  $("b1").onclick = async () => {
    $("err").textContent = "Checking…";
    const r = await api("/auth/login", { vpa: $("vpa").value, pin: $("pin").value, device_id: "authlab" });
    if (!r.ok) return $("err").textContent = r.data.detail || "Login failed";
    TOKEN = r.data.token; USER = { ...r.data, proof: "PIN" };
    go("home", true);
  };
  $("b2").onclick = async () => {
    const vpa = $("vpa").value;
    $("err").textContent = "Waiting for Touch ID…";
    try {
      const o = await api("/auth/webauthn/login-options", { vpa });
      if (!o.ok) return $("err").textContent = o.data.detail || "No passkey — register one first";
      const cred = await SimpleWebAuthnBrowser.startAuthentication(o.data);
      const r = await api("/auth/webauthn/login-verify", { vpa, credential: cred, fingerprint: fingerprint() });
      if (!r.ok) return $("err").textContent = r.data.detail || "Passkey failed";
      TOKEN = r.data.token; USER = { ...r.data, proof: "Passkey" };
      go("home", true);
    } catch (e) { $("err").textContent = String(e.message || e); }
  };
  $("b3").onclick = async () => {
    const vpa = $("vpa").value;
    // Enrolment needs a session: a passkey is only ever as strong as whatever was
    // allowed to enrol it. This used to bind a key to any VPA with no credential at
    // all — and a VPA is public, you hand it out to get paid — so anyone could enrol
    // their own authenticator on your account and then log in as you. The PIN
    // bootstraps the passkey; the passkey replaces the PIN afterwards.
    $("err").textContent = "Checking PIN…";
    const li = await api("/auth/login", { vpa, pin: $("pin").value, device_id: "authlab" });
    if (!li.ok) return $("err").textContent = li.data.detail || "Your PIN is needed to bind a passkey";
    TOKEN = li.data.token;
    $("err").textContent = "Waiting for Touch ID…";
    try {
      const o = await api("/auth/webauthn/register-options", { vpa }, true);
      if (!o.ok) return $("err").textContent = o.data.detail || "Failed";
      const cred = await SimpleWebAuthnBrowser.startRegistration(o.data);
      const r = await api("/auth/webauthn/register-verify",
                          { vpa, credential: cred, fingerprint: fingerprint() }, true);
      $("err").textContent = r.ok ? "✅ Passkey bound to this device — now tap “Login with passkey”"
                                  : (r.data.detail || "Failed");
    } catch (e) { $("err").textContent = String(e.message || e); }
  };
}

/* ───────────────────────────── 2. HOME ───────────────────────────── */
function Home() {
  $("body").innerHTML = `
    <div class="bal">
      <div class="lbl">Available balance</div>
      <div class="amt">${money(USER.balance ?? 0)}</div>
      <div class="who">${USER.name} · ${USER.vpa}</div>
    </div>
    <button class="primary" id="p">Send money</button>
    <button id="d">Device & security</button>
    <button id="f">Fraud Ops Console</button>
    <button class="ghost" id="o">Log out</button>`;
  $("p").onclick = () => go("pay");
  $("d").onclick = () => go("device");
  $("f").onclick = () => go("ops");
  $("o").onclick = () => { TOKEN = null; USER = null; stack.length = 0; go("login"); };
}

/* ───────────────────────────── 3. PAY ───────────────────────────── */
function Pay() {
  $("body").innerHTML = `
    <label>Pay to (UPI ID)</label>
    <input id="to" value="sunita.sawant@oksbi" />
    <button class="ghost" id="chk" style="text-align:left">Check this payee →</button>
    <div id="risk"></div>
    <label>Amount</label><input id="amt" value="700" />
    <label>UPI PIN (6-digit)</label><input id="upin" type="password" value="123456" />
    <div class="tile" style="margin-top:4px">
      <div class="t">Device risk signals (RASP) <span class="pill amber">demo</span></div>
      <label style="display:block;font-weight:400"><input type="checkbox" id="r_root" style="width:auto;margin-right:6px">Rooted / emulator</label>
      <label style="display:block;font-weight:400"><input type="checkbox" id="r_share" style="width:auto;margin-right:6px">Screen sharing active (AnyDesk)</label>
      <label style="display:block;font-weight:400"><input type="checkbox" id="r_sim" style="width:auto;margin-right:6px">SIM mismatch</label>
      <div class="step">These are what a real app's RASP layer detects. The fraud engine treats
        them as hard-rule overrides (e.g. screen-share → block), not just score points.</div>
    </div>
    <button class="primary" id="go">Pay</button>
    <button class="ghost" id="mule">Try paying a known mule →</button>
    <div class="err" id="err"></div>`;

  const check = async () => {
    const r = await api("/precheck", { sender_vpa: USER.vpa, receiver_vpa: $("to").value });
    if (!r.ok) return $("risk").innerHTML = "";
    const d = r.data;
    $("risk").innerHTML = d.warn
      ? `<div class="tile warn"><div class="t">⚠️ ${d.risk_level} risk — ${d.receiver_name}</div>
         <ul>${d.reasons.map(x => `<li>${x}</li>`).join("")}</ul></div>`
      : `<div class="tile"><div class="t">✅ ${d.receiver_name} <span class="pill green">looks clean</span></div>
         <div class="kv"><div>account age</div><div>${d.receiver_age_days} days</div></div></div>`;
  };
  $("chk").onclick = check;
  $("to").onblur = check;
  check();

  const pay = async (to) => {
    const amount = Number($("amt").value);
    const sig = to + ":" + amount;
    $("err").textContent = "Running fraud engine…";
    const r = await api("/pay", { sender_vpa: USER.vpa, receiver_vpa: to,
      amount, pin: $("upin").value,
      device_id: "authlab", type: "PAY", channel: "MANUAL",
      idempotency_key: idemKey(sig),                       // stable across retries of THIS attempt
      rooted: $("r_root").checked ? 1 : 0,
      screen_share: $("r_share").checked ? 1 : 0,
      sim_mismatch: $("r_sim").checked ? 1 : 0 }, true);
    delete payKeys[sig];                                   // attempt resolved → next pay gets a fresh key
    if (!r.ok && !r.data.label) return $("err").textContent = r.data.detail || "Payment failed";
    LAST = { ...r.data, to, amount };
    if (r.data.sender_balance != null) USER.balance = r.data.sender_balance;
    // REVIEW → step-up OTP needed before the money moves
    if (r.data.result === "REVIEW") return go("payotp");
    go("result");
  };
  $("go").onclick = () => pay($("to").value);
  $("mule").onclick = () => pay("cash.quick777@paytm");   // L1 collector, fresh + blacklisted
}

/* ─────────────────── 3b. PAY — STEP-UP OTP (REVIEW) ───────────────────
   A REVIEW verdict holds the payment as 'pending' and issues an OTP. The code is
   deliberately NOT in the /pay response (a challenge you hand back is no second
   factor) — it is printed to the SERVER LOG. Enter it here to release the payment. */
function PayOtp() {
  $("body").innerHTML = `
    <div class="tile warn">
      <div class="t">⏳ Extra verification — ${money(LAST.amount)} to ${LAST.to}</div>
      <div class="step">${LAST.message || "Enter the OTP to complete this payment."}</div>
    </div>
    <label>6-digit OTP</label><input id="otp" maxlength="6" inputmode="numeric" />
    <div class="tile"><div class="step"><b>No SMS sent (demo).</b> The OTP is in the
      <b>server log</b> — look for <code>[OTP CHALLENGE] Transaction #${LAST.transaction_id}</code>.
      A step-up code handed back in the API response would not be a real second factor.</div></div>
    <button class="primary" id="v">Verify & pay</button>
    <button class="ghost" id="rs">Resend code</button>
    <button id="h">Cancel</button>
    <div class="err" id="err"></div>`;
  $("h").onclick = () => { stack.length = 0; go("home"); };
  $("v").onclick = async () => {
    $("err").textContent = "Verifying…";
    const r = await api("/pay/verify-otp",
      { pending_txn_id: LAST.transaction_id, otp: $("otp").value, device_id: "authlab" }, true);
    if (!r.ok) return $("err").textContent = r.data.detail || "Wrong or expired OTP";
    LAST = { ...LAST, ...r.data };
    if (r.data.sender_balance != null) USER.balance = r.data.sender_balance;
    go("result", true);
  };
  $("rs").onclick = async () => {
    $("err").textContent = "Requesting a new code…";
    const r = await api("/pay/resend-otp", { pending_txn_id: LAST.transaction_id }, true);
    $("err").textContent = r.ok ? "New code generated — check the server log." : (r.data.detail || "Resend failed");
  };
}

/* ───────────────────────────── 4. RESULT ───────────────────────────── */
function Result() {
  const l = LAST.label;
  const skin = l === "BLOCK"  ? { i:"🛑", c:"#ff6b8a", p:"red",   h:"Blocked" }
             : l === "REVIEW" ? { i:"⏳", c:"#ffb454", p:"amber", h:"Needs verification" }
             : LAST.post_review ? { i:"⚠️", c:"#ffb454", p:"amber", h:"Paid — but flagged" }
             :                  { i:"✅", c:"#63e089", p:"green", h:"Paid" };
  $("body").innerHTML = `
    <div class="res">
      <div class="ico">${skin.i}</div>
      <div class="big" style="color:${skin.c}">${skin.h} ${money(LAST.amount)}</div>
      <div class="who2">to ${LAST.to}</div>
      <div class="msg" style="color:${skin.c}">${LAST.post_message || LAST.message || ""}</div>
    </div>
    <div class="tile">
      <div class="t">Fraud engine <span class="pill ${skin.p}">${l} · ${LAST.score}/100</span></div>
      ${(LAST.reasons || []).slice(0,5).map(r => `<div class="rsn">• ${r}</div>`).join("") || `<div class="rsn">• no risk signals fired</div>`}
      <div class="step" style="margin-top:9px">
        <b>&lt;35</b> safe <b>·</b> <b>35–59</b> verify <b>·</b> <b>60+</b> block
      </div>
    </div>
    ${l === "BLOCK" ? `<div class="tile"><div class="t">Your money</div>
        <div class="rsn">• Not deducted — the debit never ran</div>
        <div class="rsn">• Alert raised to the bank's fraud team</div></div>` : ""}
    ${LAST.post_review ? `<button class="primary" id="rc">Recall this payment (request bank reversal)</button>` : ""}
    <button id="rp">Report this payee (blacklist)</button>
    <button id="h">Back to home</button>
    <div class="err" id="err"></div>`;
  $("h").onclick = () => { stack.length = 0; go("home"); };
  if ($("rc")) $("rc").onclick = async () => {
    $("err").textContent = "Filing a reversal request to the bank…";
    const r = await api(`/pay/recall/${LAST.transaction_id}`, {}, true);
    if (r.ok) {
      USER.balance = r.data.sender_balance;
      const bd = r.data.bank_decision;
      $("err").innerHTML = `✅ ${r.data.message}` + (bd ? `<div class="step">Bank decision: <b>${bd.decision}/${bd.reason_code}</b></div>` : "");
    } else $("err").textContent = r.data.detail || "Recall failed";
  };
  $("rp").onclick = async () => {
    $("err").textContent = "Reporting…";
    const r = await api("/report", { reported_vpa: LAST.to, reporter_vpa: USER.vpa, reason: "scam" }, true);
    $("err").textContent = r.ok ? "✅ " + (r.data.message || "Reported + blacklisted.") : (r.data.detail || "Report failed");
  };
}

/* ═════════════════ ONBOARDING — the real UPI shape ═════════════════
   Real UPI proves the SIM is physically in the device via an automated outbound
   encrypted SMS (the "first factor", and the PSP's sole liability). A web app
   cannot touch the SIM, so we substitute an inbound OTP: that proves you own the
   NUMBER, not that the SIM is in THIS device — weaker, and we say so out loud.
   The device factor is then done properly by the passkey (hardware-backed).   */

/* ── A. phone ── */
function Phone() {
  $("body").innerHTML = `
    <h2>Enter your mobile</h2>
    <div class="sub">We'll send a 6-digit code to verify it's you.</div>
    <label>Mobile number</label><input id="ph" placeholder="9876543210" maxlength="10" />
    <button class="primary" id="n">Send code</button>
    <div class="tile" style="margin-top:14px">
      <div class="t">Step 1 of 4 — number</div>
      <div class="step">Real UPI sends an <b>outbound SMS from your SIM</b> to prove the SIM sits in this
        phone. The web can't read the SIM, so we verify the number by OTP instead — and bind the
        <b>device</b> separately with a passkey.</div>
    </div>
    <div class="err" id="err"></div>`;
  $("n").onclick = async () => {
    const p = $("ph").value.replace(/\D/g, "");
    if (p.length !== 10) return $("err").textContent = "Enter a 10-digit mobile number";
    $("err").textContent = "Generating code…";
    const r = await api("/auth/send-otp", { phone: p });
    if (!r.ok) return $("err").textContent = r.data.detail || "Failed to send";
    NEW.phone = p; NEW.otpDemo = r.data.otp_demo;
    go("otp");
  };
}

/* ── B. otp ── */
function Otp() {
  $("body").innerHTML = `
    <h2>Verify your number</h2>
    <div class="sub">Code generated for +91 ****${NEW.phone.slice(-4)} — <b>not sent by SMS</b></div>
    <label>6-digit code</label><input id="c" maxlength="6" inputmode="numeric" />
    ${NEW.otpDemo ? `<div class="tile warn" style="margin-top:10px">
      <div class="t">demo code: ${NEW.otpDemo}</div>
      <div class="step"><b>No SMS was sent.</b> Delivering an OTP to an Indian number needs TRAI
        <b>DLT registration</b> of the sender and the template, which needs a registered business —
        so the code is shown here and printed to the server log instead. Everything else on this
        screen (code generation, expiry, attempt limits) is real; only delivery is stubbed.</div></div>` : ""}
    <button class="primary" id="n">Verify</button>
    <div class="err" id="err"></div>`;
  $("n").onclick = async () => {
    $("err").textContent = "Checking…";
    const r = await api("/auth/verify-otp", { phone: NEW.phone, code: $("c").value });
    if (!r.ok) return $("err").textContent = r.data.detail || "Wrong code";
    go("details");
  };
}

/* ── C. name + bank + vpa ── */
async function Details() {
  $("body").innerHTML = `
    <h2>Your account</h2>
    <div class="sub">Pick your bank and claim a UPI ID.</div>
    <label>Full name</label><input id="nm" placeholder="Om Sawant" />
    <label>Bank</label>
    <select id="bk" style="width:100%;padding:11px 13px;border-radius:10px;background:#141418;
            border:1px solid #2e2e36;color:#fff;font-size:15px"></select>
    <label>UPI ID</label>
    <div style="display:flex;align-items:center;gap:6px">
      <input id="vp" placeholder="yourname" style="flex:1" />
      <span id="hd" style="color:#8a8a90;font-size:14px">@—</span>
    </div>
    <button class="primary" id="n">Continue</button>
    <div class="err" id="err"></div>`;
  const r = await fetch(API + "/banks").then(x => x.json()).catch(() => []);
  NEW.banks = r;
  $("bk").innerHTML = r.map(b => `<option value="${b.id}" data-h="${b.upi_handle}">${b.name}</option>`).join("");
  const setH = () => $("hd").textContent = "@" + $("bk").selectedOptions[0].dataset.h;
  $("bk").onchange = setH; setH();
  $("n").onclick = () => {
    const local = $("vp").value.trim().toLowerCase().replace(/[^a-z0-9.]/g, "");
    if (!$("nm").value.trim()) return $("err").textContent = "Enter your name";
    if (local.length < 3) return $("err").textContent = "UPI ID must be at least 3 characters";
    NEW.name = $("nm").value.trim();
    NEW.bank_id = Number($("bk").value);
    NEW.vpa = local + "@" + $("bk").selectedOptions[0].dataset.h;
    go("pins");
  };
}

/* ── D. pins ── */
function Pins() {
  $("body").innerHTML = `
    <h2>Set your PINs</h2>
    <div class="sub">${NEW.vpa}</div>
    <label>App login PIN (4-digit)</label><input id="lp" type="password" maxlength="4" inputmode="numeric" />
    <label>UPI payment PIN (6-digit)</label><input id="up" type="password" maxlength="6" inputmode="numeric" />
    <div class="tile" style="margin-top:12px">
      <div class="t">Step 4 of 4 — how these are stored</div>
      <div class="step">Both are hashed with <b>Argon2id</b> and a server-side <b>pepper</b> kept out of the
        database, then rate-limited to 3 attempts. In real UPI the UPI-PIN never reaches the app at
        all (NPCI's Common Library captures it) — so this is a <b>simulated</b> app PIN, not a UPI PIN.</div>
    </div>
    <button class="primary" id="n">Create account</button>
    <div class="err" id="err"></div>`;
  $("n").onclick = async () => {
    if ($("lp").value.length !== 4) return $("err").textContent = "App PIN must be 4 digits";
    if ($("up").value.length !== 6) return $("err").textContent = "UPI PIN must be 6 digits";
    $("err").textContent = "Creating…";
    const r = await api("/auth/register", {
      phone: NEW.phone, name: NEW.name, vpa: NEW.vpa, bank_id: NEW.bank_id,
      upi_pin: $("up").value, login_pin: $("lp").value, device_id: "authlab",
    });
    if (!r.ok) return $("err").textContent = r.data.detail || "Registration failed";
    TOKEN = r.data.token;
    USER = { ...r.data, proof: "PIN" };
    stack.length = 0;
    go("home");
  };
}

/* ───────────────────────────── 5. DEVICE ───────────────────────────── */
function Device() {
  const fp = fingerprint();
  $("body").innerHTML = `
    <div class="tile">
      <div class="t">Identity — how you were proved</div>
      <div class="kv"><div>method</div><div>${USER.proof}
        <span class="pill ${USER.proof === "Passkey" ? "green" : "amber"}">
          ${USER.proof === "Passkey" ? "hardware-backed" : "knowledge factor"}</span></div>
        <div>drift</div><div>${USER.fingerprint_drift ? USER.fingerprint_drift.drift_score + "/100" : "—"}</div></div>
      <div class="step">A passkey's private key lives in this device's secure hardware and never leaves it, so the device <b>proves</b> itself by signature.</div>
    </div>
    <div class="tile">
      <div class="t">Fingerprint <span class="pill amber">signal, not proof</span></div>
      <div class="kv">${Object.entries(fp).map(([k,v]) =>
        `<div>${k}</div><div>${String(v).slice(0,44)}</div>`).join("")}</div>
      <div class="step">Recomputed every call — never cached. Only used to score <b>drift</b> against the baseline saved with your passkey.</div>
    </div>
    <button id="h">Back</button>`;
  $("h").onclick = back;
}

/* ─────────────────────── 6. FRAUD OPS CONSOLE ───────────────────────
   Surfaces the advanced backend LAYERS that have no place in a normal user
   screen: the post-payment monitor, the ledger reconcile, and the live UPI
   daily-limit usage. The bank reversal-desk (adjudication) is reached from a
   flagged payment's "Recall" button on the Result screen. ──────────────── */
function Ops() {
  const CAP_DAY_AMT = 100000, CAP_DAY_CNT = 20;
  $("body").innerHTML = `
    <div class="tile">
      <div class="t">Post-payment monitor <span class="pill amber">second line</span></div>
      <div class="step">Inline scoring sees ONE payment; a mule ring shows only AFTER money
        moves. This re-scans committed transfers for collection (fan-in) and pass-through mules,
        and raises ALERTS — it never moves money.</div>
      <button class="primary" id="mScan" style="margin-top:10px">Scan last 120 min</button>
      <div id="mOut" style="margin-top:8px"></div>
    </div>

    <div class="tile">
      <div class="t">Ledger integrity <span class="pill green">double-entry</span></div>
      <div class="step">Append-only ledger. Reconcile proves: every transfer's legs sum to zero,
        each balance == SUM(its entries), and the whole system nets to zero.</div>
      <button class="primary" id="lScan" style="margin-top:10px">Reconcile now</button>
      <div id="lOut" style="margin-top:8px"></div>
    </div>

    <div class="tile">
      <div class="t">UPI daily limits <span class="pill amber">live</span></div>
      <div class="step">Real caps enforced on every /pay: ₹1,00,000 per transaction, and a rolling
        24h cap of ₹1,00,000 across up to 20 transfers. Below = your live usage.</div>
      <button class="primary" id="uScan" style="margin-top:10px">Check my usage</button>
      <div id="uOut" style="margin-top:8px"></div>
    </div>

    <div class="tile">
      <div class="t">Bank server <span class="pill amber">escalation queue</span></div>
      <div class="step">The app never freezes another bank's account or claws its money. The
        engine files a REQUEST; the bank rules on its own evidence — and UNBLOCKS an account the
        engine wrongly caught. Recall on a flagged payment uses the same desk (ISO ACCR/RJCR/PDCR).</div>
      <button class="primary" id="bScan" style="margin-top:10px">Load bank queue</button>
      <div id="bOut" style="margin-top:8px"></div>
    </div>

    <div class="tile warn">
      <div class="step">⚠️ <b>Synthetic data.</b> The fraud model is trained &amp; evaluated on a
        generated dataset — real UPI transaction data isn't public (RBI rules). The numbers prove
        the workflow works, <b>not</b> real-world accuracy.</div>
    </div>
    <button id="h">Back to home</button>`;
  $("h").onclick = () => { stack.length = 0; go("home"); };

  /* 1. monitor */
  $("mScan").onclick = async () => {
    $("mOut").innerHTML = `<div class="rsn">Scanning…</div>`;
    const r = await apiGet("/fraud/monitor?window_min=120");
    if (!r.ok) return $("mOut").innerHTML = `<div class="rsn" style="color:#ff6b8a">${r.data.detail || "Scan failed"}</div>`;
    const d = r.data;
    const head = `<div class="kv"><div>window</div><div>${d.window_minutes}m</div>
      <div>suspects</div><div style="color:${d.suspected_mules ? "#ff6b8a" : "#63e089"}">${d.suspected_mules}</div>
      <div>alerts raised</div><div>${d.alerts_raised}</div></div>`;
    const list = (d.suspects || []).length === 0
      ? `<div class="rsn">• No mule patterns in this window — clean.</div>`
      : d.suspects.map(s => `<div class="rsn" style="color:#ff6b8a">• <b>${s.vpa}</b> — ${
          s.pattern === "collection"
            ? `collection mule: fan-in ${s.fan_in} · ${s.victims} txns · ${money(s.total || 0)} · age ${s.age_days}d`
            : `pass-through: got ${money(s.received || 0)} → forwarded ${money(s.forwarded || 0)} · age ${s.age_days}d`
        }</div>`).join("");
    $("mOut").innerHTML = head + list;
  };

  /* 2. ledger */
  $("lScan").onclick = async () => {
    $("lOut").innerHTML = `<div class="rsn">Reconciling…</div>`;
    const r = await apiGet("/ledger/verify");
    if (!r.ok) return $("lOut").innerHTML = `<div class="rsn" style="color:#ff6b8a">${r.data.detail || "Verify failed"}</div>`;
    const d = r.data;
    const ok = d.consistent;
    $("lOut").innerHTML = `
      <div class="rsn" style="color:${ok ? "#63e089" : "#ff6b8a"};font-weight:700">
        ${ok ? "✅ RECONCILED" : "🛑 RECONCILIATION FAILED"}</div>
      <div class="kv">
        <div>entries</div><div>${d.entries}</div>
        <div>system sum</div><div style="color:${d.system_sum === 0 ? "#63e089" : "#ff6b8a"}">${money(d.system_sum)}</div>
        <div>unbalanced transfers</div><div>${(d.unbalanced_transfers || []).length}</div>
        <div>balance drift</div><div style="color:${(d.balance_drift || []).length ? "#ff6b8a" : "#63e089"}">${(d.balance_drift || []).length}</div>
      </div>
      ${(d.balance_drift || []).map(x => `<div class="rsn" style="color:#ff6b8a">• ${x.vpa}: balance ${money(x.balance)} vs ledger ${money(x.ledger)}</div>`).join("")}
      <div class="step" style="margin-top:6px">${d.message}</div>`;
  };

  /* 3. limits */
  $("uScan").onclick = async () => {
    $("uOut").innerHTML = `<div class="rsn">Reading your last 24h…</div>`;
    const r = await apiGet("/transactions/" + encodeURIComponent(USER.vpa), true);
    if (!r.ok || !Array.isArray(r.data)) return $("uOut").innerHTML = `<div class="rsn" style="color:#ff6b8a">${r.data.detail || "Could not read history"}</div>`;
    const dayAgo = Date.now() - 24 * 60 * 60 * 1000;
    let amt = 0, cnt = 0;
    for (const t of r.data) {
      const mine = t.sender === USER.vpa;
      const okS = t.status === "success" || t.status === "flagged";
      const ts = t.created_at ? Date.parse(t.created_at) : NaN;
      const inWin = isNaN(ts) ? true : ts >= dayAgo;
      if (mine && okS && inWin) { amt += Number(t.amount) || 0; cnt += 1; }
    }
    const amtPct = Math.min(100, (amt / CAP_DAY_AMT) * 100);
    const cntPct = Math.min(100, (cnt / CAP_DAY_CNT) * 100);
    const bar = (pct, danger) => `<div style="height:8px;border-radius:4px;background:#2a2a30;overflow:hidden;margin:4px 0">
      <div style="height:100%;width:${pct}%;border-radius:4px;background:${danger ? "#ff6b8a" : "#63e089"}"></div></div>`;
    $("uOut").innerHTML = `
      <div class="rsn">Amount used (24h): <b>${money(amt)}</b> / ${money(CAP_DAY_AMT)}</div>
      ${bar(amtPct, amt >= CAP_DAY_AMT)}
      <div class="step">${money(Math.max(0, CAP_DAY_AMT - amt))} left today</div>
      <div class="rsn" style="margin-top:8px">Transfers used (24h): <b>${cnt}</b> / ${CAP_DAY_CNT}</div>
      ${bar(cntPct, cnt >= CAP_DAY_CNT)}
      <div class="step">${Math.max(0, CAP_DAY_CNT - cnt)} transfers left today</div>`;
  };

  /* 4. bank server — escalation queue + the bank's rulings */
  const renderBank = (d) => {
    const pend = d.pending_account_reviews || [], revs = d.pending_reversals || [], dec = d.bank_decisions || [];
    $("bOut").innerHTML =
      `<div class="rsn" style="margin-top:4px"><b>Engine → Bank · awaiting review (${pend.length})</b></div>` +
      (pend.length === 0
        ? `<div class="rsn">• none pending</div>`
        : pend.map(r => `<div class="rsn" style="color:#ffb454">• <b>${r.vpa}</b> — provisional block ·
             age ${r.age_days}d · ${r.is_merchant ? "merchant" : "personal"}
             <button class="ghost bankRev" data-vpa="${r.vpa}"
               style="margin-left:6px;padding:3px 9px;font-size:11px;width:auto;display:inline-block">Run bank review</button>
           </div>`).join("")) +
      (revs.length
        ? `<div class="rsn" style="margin-top:8px"><b>Reversals held (need 1930/CFCFRMS ref)</b></div>` +
          revs.map(r => `<div class="rsn">• #${r.transaction_id} ${money(r.amount)} — ${r.payer} → ${r.payee}</div>`).join("")
        : "") +
      `<div class="rsn" style="margin-top:8px"><b>Bank rulings (${dec.length})</b></div>` +
      (dec.length === 0
        ? `<div class="rsn">• none yet</div>`
        : dec.map(x => `<div class="rsn" style="color:${x.status === "cleared" ? "#63e089" : "#ff6b8a"}">
             • <b>${x.vpa}</b> — ${x.status === "cleared" ? "CLEARED → unblocked" : "CONFIRMED → blocked"}</div>`).join("")) +
      `<div class="step" style="margin-top:6px">${d.note || ""}</div>`;
    // wire each review button
    document.querySelectorAll(".bankRev").forEach(b => {
      b.onclick = async () => {
        b.textContent = "Bank reviewing…"; b.disabled = true;
        await api("/bank/review-account", { vpa: b.dataset.vpa }, true);
        const r = await apiGet("/bank/pending");
        if (r.ok) renderBank(r.data);
      };
    });
  };

  $("bScan").onclick = async () => {
    $("bOut").innerHTML = `<div class="rsn">Loading bank queue…</div>`;
    const r = await apiGet("/bank/pending");
    if (!r.ok) return $("bOut").innerHTML = `<div class="rsn" style="color:#ff6b8a">${r.data.detail || "Failed"}</div>`;
    renderBank(r.data);
  };
}

go("login");
</script>
