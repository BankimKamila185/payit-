services:
  - type: web
    name: upi-fraud-scoring-service
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn ml.fraud_service:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: upi-fraud-db
          property: connectionString

  - type: web
    name: upi-payment-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server.app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: upi-fraud-db
          property: connectionString
      - key: FRAUD_SERVICE_URL
        fromService:
          type: web
          name: upi-fraud-scoring-service
          property: host
      - key: ALLOWED_ORIGINS
        value: "*"

databases:
  - name: upi-fraud-db
    plan: free
